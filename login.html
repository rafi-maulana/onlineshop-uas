<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - TOKO GENZ</title>
    <meta name="description" content="Masuk atau daftar untuk berbelanja di TOKO GENZ - destinasi elektronik premium pilihan Anda.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        (function () {
            const theme = localStorage.getItem('theme') || 'dark';
            document.documentElement.classList.toggle('dark', theme === 'dark');
        })();
    </script>
  <script type="module" crossorigin src="/onlineshop-uas/assets/login-DduckSsP.js"></script>
  <link rel="modulepreload" crossorigin href="/onlineshop-uas/assets/api-aNj5MOMe.js">
  <link rel="stylesheet" crossorigin href="/onlineshop-uas/assets/api-B47YwrSn.css">
</head>
<body class="bg-[#0b0f19] text-[#f1f5f9] min-h-screen flex items-center justify-center p-4 relative selection:bg-violet-500 selection:text-white">
    
    <!-- Mesh Gradients -->
    <div class="absolute inset-0 overflow-hidden -z-10 pointer-events-none">
      <div class="absolute top-[20%] left-[20%] w-[400px] h-[400px] rounded-full bg-violet-600/20 blur-[130px]"></div>
      <div class="absolute bottom-[20%] right-[20%] w-[500px] h-[500px] rounded-full bg-blue-600/20 blur-[150px]"></div>
    </div>

    <div class="w-full max-w-lg">
        <!-- Login Card -->
        <div class="glass p-8 md:p-10 rounded-3xl shadow-2xl border border-white/5 relative">
            <!-- Logo -->
            <div class="text-center mb-8">
                <a href="index.html" id="logoText" class="text-3xl font-extrabold bg-gradient-to-r from-violet-400 via-fuchsia-400 to-blue-400 bg-clip-text text-transparent">
                    TOKO GENZ
                </a>
                <h1 id="cardTitle" class="text-lg font-bold text-white mt-3">Selamat Datang Kembali!</h1>
                <p id="cardSubtitle" class="text-xs text-slate-400 mt-1">Masuk untuk melanjutkan berbelanja</p>
            </div>

            <!-- Quick Access Buttons -->
            <div class="mb-6">
                <p class="text-xs text-center text-slate-500 mb-3 font-semibold uppercase tracking-wider">Akses Cepat (Demo)</p>
                <div class="grid grid-cols-2 gap-3">
                    <button id="quickUserBtn" type="button" class="group relative bg-slate-900/60 border border-slate-700 hover:border-violet-500/50 hover:bg-slate-800/60 text-slate-300 text-sm font-bold py-3.5 px-3 rounded-2xl transition-all text-center cursor-pointer overflow-hidden">
                        <div class="absolute inset-0 bg-gradient-to-r from-violet-600/0 to-violet-600/0 group-hover:from-violet-600/5 group-hover:to-indigo-600/5 transition-all"></div>
                        <div class="relative flex flex-col items-center gap-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-violet-400" viewBox="0 0 24 24" fill="currentColor">
                                <path fill-rule="evenodd" d="M7.5 6a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM3.751 20.105a8.25 8.25 0 0116.498 0 .75.75 0 01-.437.695A18.683 18.683 0 0112 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 01-.437-.695z" clip-rule="evenodd" />
                            </svg>
                            <span>Demo Pelanggan</span>
                        </div>
                    </button>
                    <button id="quickAdminBtn" type="button" class="group relative bg-violet-500/10 border border-violet-500/30 hover:border-violet-400/60 hover:bg-violet-500/20 text-violet-400 text-sm font-bold py-3.5 px-3 rounded-2xl transition-all text-center cursor-pointer overflow-hidden">
                        <div class="relative flex flex-col items-center gap-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor">
                                <path fill-rule="evenodd" d="M11.484 2.17a.75.75 0 011.032 0 11.209 11.209 0 007.877 3.08.75.75 0 01.722.515 12.74 12.74 0 01.635 3.985c0 5.942-4.064 10.933-9.563 12.348a.749.749 0 01-.374 0C6.314 20.683 2.25 15.692 2.25 9.75c0-1.39.189-2.737.542-4.003.124-.44.522-.73.974-.696a10.54 10.54 0 007.718-2.882z" clip-rule="evenodd" />
                            </svg>
                            <span>Demo Admin</span>
                        </div>
                    </button>
                </div>
            </div>

            <!-- Divider -->
            <div class="relative mb-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-white/5"></div>
                </div>
                <div class="relative flex justify-center text-xs">
                    <span class="px-3 bg-transparent text-slate-500 font-semibold uppercase tracking-wider">atau masuk dengan email</span>
                </div>
            </div>

            <!-- Form -->
            <form id="authForm" class="space-y-4">
                <!-- Register only fields -->
                <div id="registerFields" class="hidden space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Nama Lengkap</label>
                        <input type="text" id="name" placeholder="Contoh: Budi Santoso" class="w-full bg-slate-950/50 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-violet-500 focus:ring-2 focus:ring-violet-500/20 transition-all placeholder-slate-600 text-white">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Email / Username</label>
                    <input type="text" id="email" required placeholder="nama@contoh.com atau admin" class="w-full bg-slate-950/50 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-violet-500 focus:ring-2 focus:ring-violet-500/20 transition-all placeholder-slate-600 text-white">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Kata Sandi (Password)</label>
                    <input type="password" id="password" required minlength="6" placeholder="••••••••" class="w-full bg-slate-950/50 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-violet-500 focus:ring-2 focus:ring-violet-500/20 transition-all placeholder-slate-600 text-white">
                </div>
                
                <!-- Error message -->
                <div id="errorMsg" class="hidden bg-red-500/10 border border-red-500/20 text-red-400 text-sm px-4 py-3 rounded-xl"></div>
                
                <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-violet-600 to-indigo-600 hover:from-violet-700 hover:to-indigo-700 text-white font-bold py-3.5 px-4 rounded-xl transition-all shadow-lg shadow-indigo-600/25 hover:shadow-indigo-600/40 cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed">
                    Masuk
                </button>
            </form>

            <!-- Toggle Auth -->
            <div class="mt-6 text-center">
                <button id="toggleAuth" class="text-xs font-semibold text-violet-400 hover:text-violet-300 hover:underline cursor-pointer transition-colors">
                    Belum punya akun? Daftar di sini
                </button>
            </div>
        </div>

        <!-- Demo credentials hint -->
        <div class="mt-4 glass rounded-2xl px-5 py-3 border border-white/5 flex items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-violet-400 flex-shrink-0" viewBox="0 0 24 24" fill="currentColor">
                <path fill-rule="evenodd" d="M2.25 12c0-5.385 4.365-9.75 9.75-9.75s9.75 4.365 9.75 9.75-4.365 9.75-9.75 9.75S2.25 17.385 2.25 12zm8.706-1.442c1.146-.573 2.437.463 2.126 1.706l-.709 2.836.042-.02a.75.75 0 01.67 1.34l-.04.022c-1.147.573-2.438-.463-2.127-1.706l.71-2.836-.042.02a.75.75 0 11-.671-1.34l.041-.022zM12 9a.75.75 0 100-1.5.75.75 0 000 1.5z" clip-rule="evenodd" />
            </svg>
            <p class="text-xs text-slate-500">Admin: <span class="text-slate-400 font-mono">admin@admin.com</span> / <span class="text-slate-400 font-mono">admin123</span></p>
        </div>
    </div>

</body>
</html>
